name: 'E2E'

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.vscode/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.vscode/**'

jobs:
  playwright:
    name: E2E Tests
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      GLSP_REPO_DIR: '${{ github.workspace }}'
      GLSP_SERVER_PORT: '8081'
      GLSP_WEBSOCKET_PATH: 'workflow'
      GLSP_SERVER_DEBUG: 'true'
      GLSP_SERVER_TYPE: 'java'

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: 'glsp-server'
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'eclipse-glsp/glsp-playwright'
          path: 'glsp-playwright'
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: 'eclipse-glsp/glsp-client'
          path: 'glsp-client'
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install dependencies
        run: |
          cd glsp-client
          yarn
          cd ../glsp-playwright
          yarn
          cd ../glsp-server
          mvn clean verify -Pm2 -Pfatjar
      - name: Run Playwright tests
        id: run_playwright_tests
        run: |
          cd glsp-playwright
          yarn test:standalone
      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: glsp-playwright/examples/workflow-test/playwright-report/
